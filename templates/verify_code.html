<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Verificar Código</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">
    <div class="card shadow-sm p-4" style="max-width: 400px; width: 100%;">
        <h4 class="text-center mb-3">Verificación de Código</h4>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} p-2 small">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="/verify_code" method="POST">
            <div class="mb-3">
                <label for="codigo" class="form-label">Código de 6 dígitos</label>
                <input type="text" class="form-control text-center fs-4" id="codigo" name="codigo" maxlength="6" placeholder="000000" required>
            </div>
            <button type="submit" class="btn btn-success w-100">Validar Código</button>
        </form>
    </div>
</body>
</html>
